<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo Extra</title>
<style>
  :root {
    --blue: #0A84FF;
    --green: #30D158;
    --red: #FF453A;
    --yellow: #FFD60A;
    --gray1: #8E8E93;
    --gray2: #3A3A3C;
    --gray3: #2C2C2E;
    --card: #0D0D0D;
    --card2: #161616;
    --card3: #1E1E1E;
    --sep: rgba(255,255,255,0.07);
    --label: #FFFFFF;
    --label2: rgba(255,255,255,0.45);
    --bg: #000000;
    --shadow: 0 4px 24px rgba(0,0,0,0.9);
    --r: 16px;
  }
  html, body { background: #000 !important; min-height: 100%; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg); color: var(--label);
    min-height: 100vh; padding-bottom: 120px;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  .header {
    background: rgba(0,0,0,0.95);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    position: sticky; top: 0; z-index: 100;
    padding: 14px 20px 12px;
    border-bottom: 0.5px solid var(--sep);
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -.5px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .today-btn {
    background: rgba(10,132,255,0.15); color: var(--blue);
    border: none; border-radius: 20px; padding: 7px 16px;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .today-btn:active { background: rgba(10,132,255,0.28); }

  /* back button (X) */
  .back-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--card3); border: none; color: var(--label2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .back-btn:active { background: var(--gray2); }
  .back-btn svg { width: 16px; height: 16px; }

  /* sync pill (allineata al sistema dell'app principale) */
  .sync-group { display:flex; align-items:center; gap:8px; background:var(--card3); border:0.5px solid var(--sep); border-radius:100px; padding:4px 4px 4px 12px; transition:border-color .3s; }
  .sync-group.state-ok { border-color: rgba(48,209,88,0.4); }
  .sync-group.state-err { border-color: rgba(255,69,58,0.4); }
  .sync-pill-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; transition:background .3s, box-shadow .3s; }
  .sync-pill-dot.syncing { background: var(--yellow); box-shadow:0 0 0 2px rgba(255,214,10,0.25); animation: syncPulse 1s ease-in-out infinite; }
  .sync-pill-dot.ok { background: var(--green); box-shadow:0 0 0 2px rgba(48,209,88,0.2); }
  .sync-pill-dot.err { background: var(--red); box-shadow:0 0 0 2px rgba(255,69,58,0.2); }
  @keyframes syncPulse { 0%,100%{opacity:.45} 50%{opacity:1} }
  .sync-pill-lbl { font-size:12px; font-weight:600; color:var(--red); letter-spacing:-0.1px; white-space:nowrap; display:none; }
  .sync-pill-lbl.err { display:inline; }
  #btnRefresh { width:32px; height:32px; border-radius:50%; background:var(--card); border:0.5px solid var(--sep); color:var(--blue); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .1s, transform .1s; }
  #btnRefresh:active { background:var(--gray2); transform:scale(.88); }
  #btnRefresh.spinning svg { animation: spinOnce .5s cubic-bezier(.32,1,.22,1) forwards; }
  @keyframes spinOnce { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

  .month-nav { display: flex; align-items: center; justify-content: center; }
  .nav-arrow {
    background: none; border: none; cursor: pointer;
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--blue);
  }
  .nav-arrow:active { background: rgba(255,255,255,.06); }
  .nav-arrow svg { width: 20px; height: 20px; }
  .month-year { font-size: 18px; font-weight: 600; min-width: 180px; text-align: center; letter-spacing: -.2px; }

  /* ── CALENDAR ── */
  .cal-wrap { padding: 14px 14px 0; }
  .cal-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 0.5px solid var(--sep); }
  .weekdays { display: grid; grid-template-columns: repeat(7,1fr); padding: 10px 6px 8px; border-bottom: 0.5px solid var(--sep); }
  .wd { text-align: center; font-size: 11px; font-weight: 600; color: var(--gray1); text-transform: uppercase; letter-spacing: .6px; }
  .wd.we { color: var(--red); }
  .days-grid { display: grid; grid-template-columns: repeat(7,1fr); padding: 6px 4px 10px; }

  .day-cell {
    display: flex; flex-direction: column; align-items: center;
    padding: 5px 2px 6px; cursor: pointer; border-radius: 12px;
    min-height: 58px; transition: background .1s; user-select: none;
  }
  .day-cell:active { background: rgba(255,255,255,.05); }
  .day-cell.other { opacity: .18; }
  .day-num {
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; font-size: 17px; font-weight: 400; color: var(--label);
  }
  .day-cell.is-today .day-num { background: var(--blue); color: #fff; font-weight: 700; }
  .day-cell.is-sel:not(.is-today) .day-num { background: rgba(255,255,255,.12); color: #fff; font-weight: 600; box-shadow: inset 0 0 0 1.5px rgba(255,255,255,.2); }
  .day-cell.is-we:not(.is-today):not(.is-sel) .day-num { color: var(--red); }
  .day-badge {
    margin-top: 4px; min-width: 20px; height: 18px;
    background: var(--green); border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 5px; font-size: 11px; font-weight: 700; color: #000;
    animation: badgePop .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes badgePop { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }

  /* ── BIG PLUS ── */
  .plus-wrap { display: flex; flex-direction: column; align-items: center; padding: 22px 0 6px; gap: 10px; }
  .big-plus {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--green); color: #000; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 0 rgba(48,209,88,.5), 0 8px 32px rgba(0,0,0,.6);
    transition: transform .18s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .big-plus:active { transform: scale(.88); }
  .big-plus svg { width: 30px; height: 30px; }
  .big-plus.did-add { animation: plusPulse .42s cubic-bezier(.34,1.56,.64,1); }
  @keyframes plusPulse {
    0%  { transform:scale(1); }
    30% { transform:scale(.88); }
    65% { transform:scale(1.16); box-shadow: 0 0 0 14px rgba(48,209,88,0), 0 8px 32px rgba(0,0,0,.6); }
    100%{ transform:scale(1); }
  }
  .big-plus::after { content:''; position:absolute; inset:0; border-radius:50%; border:2px solid var(--green); opacity:0; }
  .big-plus.did-add::after { animation: rippleRing .5s ease-out forwards; }
  @keyframes rippleRing { 0%{opacity:.7;transform:scale(1)} 100%{opacity:0;transform:scale(1.9)} }
  .plus-hint { font-size: 12px; color: var(--gray1); font-weight: 500; letter-spacing: .2px; transition: color .3s; }

  /* ── SUMMARY BTN ── */
  .summary-btn-wrap { padding: 14px 14px 0; }
  .summary-btn {
    width: 100%; background: var(--card); border: 0.5px solid var(--sep); border-radius: var(--r);
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-family: inherit; transition: opacity .15s;
  }
  .summary-btn:active { opacity: .6; }
  .summary-btn-left { display: flex; align-items: center; gap: 14px; }
  .summary-icon { width: 38px; height: 38px; border-radius: 11px; background: var(--blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .summary-icon svg { width: 20px; height: 20px; color: #fff; }
  .summary-label { font-size: 17px; font-weight: 600; text-align: left; }
  .summary-sub { font-size: 12px; color: var(--gray1); margin-top: 2px; }
  .summary-chev { color: var(--gray2); flex-shrink: 0; }
  .summary-chev svg { width: 16px; height: 16px; }



  /* ── DAY SHEET ── */
  .sheet-ov { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0); pointer-events:none; transition:background .25s; }
  .sheet-ov.open { background:rgba(0,0,0,.75); pointer-events:all; }
  .sheet {
    position:fixed; bottom:0; left:0; right:0;
    background: var(--card2); border-radius:24px 24px 0 0;
    border-top: 0.5px solid var(--sep);
    max-height:72vh; overflow-y:auto;
    transform:translateY(100%);
    transition:transform .32s cubic-bezier(.32,1,.46,1);
    z-index:201;
  }
  .sheet-ov.open .sheet { transform:translateY(0); }
  .sheet-handle { width:40px; height:4px; background:var(--gray2); border-radius:2px; margin:10px auto 0; }
  .sheet-head { padding:12px 18px 14px; border-bottom:0.5px solid var(--sep); display:flex; justify-content:space-between; align-items:center; }
  .sheet-title { font-size:17px; font-weight:700; }
  .sheet-count { font-size:12px; color:var(--green); margin-top:2px; font-weight:600; }
  .sheet-close { background:var(--card3); border:none; color:var(--gray1); font-size:15px; font-weight:600; border-radius:20px; padding:5px 14px; cursor:pointer; font-family:inherit; }
  .sheet-add-row { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:0.5px solid var(--sep); background:rgba(48,209,88,.04); }
  .sheet-add-lbl { font-size:15px; color:var(--label); font-weight:500; }
  .sheet-add-btn {
    width:34px; height:34px; border-radius:50%; background:var(--green); color:#000; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 10px rgba(48,209,88,.35);
    transition:transform .14s cubic-bezier(.34,1.56,.64,1); flex-shrink:0;
  }
  .sheet-add-btn:active { transform:scale(.88); }
  .sheet-add-btn.did-add { animation:plusPulse .35s cubic-bezier(.34,1.56,.64,1); }
  .sheet-add-btn svg { width:18px; height:18px; }
  .sh-item { display:flex; align-items:center; padding:14px 18px; gap:14px; border-bottom:0.5px solid var(--sep); animation:slideup .2s ease; }
  .sh-item:last-child { border-bottom:none; }
  @keyframes slideup { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .sh-num { width:30px; height:30px; border-radius:50%; background:rgba(48,209,88,.1); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--green); flex-shrink:0; }
  .sh-label { font-size:15px; font-weight:500; flex:1; }
  .sh-euro { font-size:14px; color:var(--green); font-weight:600; margin-right:4px; }
  .sh-del { background:rgba(255,69,58,.1); border:none; cursor:pointer; color:var(--red); padding:7px; border-radius:50%; display:flex; align-items:center; }
  .sh-del:active { background:rgba(255,69,58,.22); }
  .sh-del svg { width:16px; height:16px; }
  .sh-empty { padding:36px 24px; text-align:center; color:var(--gray1); font-size:15px; }
  .sh-empty-icon { font-size:40px; margin-bottom:8px; }
  .sheet-footer { padding:14px 18px 28px; border-top:0.5px solid var(--sep); }
  .reset-day-btn { width:100%; background:rgba(255,69,58,.08); border:none; color:var(--red); border-radius:12px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; }
  .reset-day-btn:active { background:rgba(255,69,58,.18); }

  /* ── SUMMARY SHEET ── */
  .sum-ov { position:fixed; inset:0; z-index:201; background:rgba(0,0,0,0); pointer-events:none; transition:background .25s; }
  .sum-ov.open { background:rgba(0,0,0,.8); pointer-events:all; }
  .sum-sheet { position:fixed; bottom:0; left:0; right:0; background:var(--bg); border-radius:24px 24px 0 0; border-top:0.5px solid var(--sep); max-height:88vh; overflow-y:auto; transform:translateY(100%); transition:transform .32s cubic-bezier(.32,1,.46,1); z-index:202; }
  .sum-ov.open .sum-sheet { transform:translateY(0); }
  .sum-handle { width:40px; height:4px; background:var(--gray2); border-radius:2px; margin:10px auto 0; }
  .sum-head { padding:14px 18px 16px; border-bottom:0.5px solid var(--sep); display:flex; justify-content:space-between; align-items:center; }
  .sum-head-title { font-size:20px; font-weight:700; color:var(--label); }
  .sum-close { background:var(--card3); border:none; color:var(--gray1); font-size:15px; font-weight:600; border-radius:20px; padding:5px 14px; cursor:pointer; font-family:inherit; }
  .sum-body { padding:16px 14px 32px; }
  .seg { display:flex; background:var(--card3); border-radius:10px; padding:2px; margin-bottom:16px; }
  .seg-btn { flex:1; border:none; background:none; padding:8px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; color:var(--gray1); }
  .seg-btn.on { background:var(--card2); color:var(--label); font-weight:600; }
  .money-card { background:linear-gradient(140deg,#30D158,#1e8f3c); border-radius:20px; padding:20px 22px; margin-bottom:16px; box-shadow:0 6px 28px rgba(48,209,88,.2); }
  .money-top { font-size:13px; color:rgba(0,0,0,.6); font-weight:500; margin-bottom:6px; }
  .money-main { display:flex; justify-content:space-between; align-items:flex-end; }
  .money-amount { font-size:44px; font-weight:800; color:#000; letter-spacing:-2px; line-height:1; }
  .money-right { text-align:right; }
  .money-units { font-size:14px; color:rgba(0,0,0,.55); }
  .money-units b { color:#000; font-weight:700; }
  .money-rate { font-size:12px; color:rgba(0,0,0,.4); margin-top:2px; }
  .sum-group { background:var(--card); border-radius:var(--r); overflow:hidden; margin-bottom:16px; border:0.5px solid var(--sep); }
  .sum-group-title { font-size:12px; font-weight:600; color:var(--gray1); text-transform:uppercase; letter-spacing:.6px; padding:12px 16px 6px; }
  .sum-row { display:flex; justify-content:space-between; align-items:center; padding:11px 16px; border-bottom:0.5px solid var(--sep); }
  .sum-row:last-child { border-bottom:none; }
  .sum-row-left { font-size:15px; color:var(--label); }
  .sum-row-right { font-size:14px; font-weight:600; color:var(--label); }
  .sum-row-right.has { color:var(--green); }
  .sum-row-right.zero { color:var(--gray2); font-weight:400; }


  .cfg-clear:active { background:rgba(255,69,58,.2); }


  /* ── CONFIRM ALERT ── */
  .confirm-ov { position:fixed; inset:0; z-index:400; background:rgba(0,0,0,.6); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:32px; opacity:0; pointer-events:none; transition:opacity .2s; }
  .confirm-ov.open { opacity:1; pointer-events:all; }
  .confirm-box { background:#1A1A1A; border:0.5px solid var(--sep); border-radius:16px; width:100%; max-width:280px; overflow:hidden; transform:scale(.9); transition:transform .25s cubic-bezier(.34,1.56,.64,1); }
  .confirm-ov.open .confirm-box { transform:scale(1); }
  .confirm-text { padding:20px 20px 16px; text-align:center; }
  .confirm-title { font-size:17px; font-weight:700; margin-bottom:6px; }
  .confirm-msg { font-size:13px; color:var(--label2); line-height:1.4; }
  .confirm-btns { display:grid; grid-template-columns:1fr 1fr; border-top:0.5px solid var(--sep); }
  .confirm-cancel,.confirm-ok { border:none; background:none; padding:15px; font-size:17px; font-family:inherit; cursor:pointer; }
  .confirm-cancel { color:var(--label2); border-right:0.5px solid var(--sep); }
  .confirm-ok { color:var(--red); font-weight:700; }
  .confirm-cancel:active { background:rgba(255,255,255,.04); }
  .confirm-ok:active { background:rgba(255,69,58,.1); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="back-btn" onclick="location.href='index.html'" aria-label="Indietro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h1>Tempo Extra</h1>
    </div>
    <div class="header-right">
      <div class="sync-group" id="syncGroup">
        <div class="sync-pill-dot syncing" id="syncDot"></div>
        <span class="sync-pill-lbl" id="syncBadge"></span>
        <button id="btnRefresh" aria-label="Aggiorna">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <button class="today-btn" onclick="goToToday()">Oggi</button>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-arrow" onclick="changeMonth(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="month-year" id="monthYear"></div>
    <button class="nav-arrow" onclick="changeMonth(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>


<!-- CALENDAR -->
<div class="cal-wrap">
  <div class="cal-card">
    <div class="weekdays">
      <div class="wd we">Dom</div><div class="wd">Lun</div><div class="wd">Mar</div>
      <div class="wd">Mer</div><div class="wd">Gio</div><div class="wd">Ven</div>
      <div class="wd we">Sab</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>
</div>

<!-- SUMMARY BTN -->
<div class="summary-btn-wrap">
  <button class="summary-btn" onclick="openSummary()">
    <div class="summary-btn-left">
      <div class="summary-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </div>
      <div>
        <div class="summary-label">Riepilogo</div>
        <div class="summary-sub" id="summaryBtnSub">—</div>
      </div>
    </div>
    <div class="summary-chev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </button>
</div>

<!-- BIG PLUS -->
<div class="plus-wrap">
  <button class="big-plus" id="bigPlus" onclick="addOne()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/>
    </svg>
  </button>
  <div class="plus-hint" id="plusHint">Aggiungi al giorno selezionato</div>
</div>

<!-- DAY SHEET -->
<div class="sheet-ov" id="sheetOv" onclick="handleSheetOv(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div>
        <div class="sheet-title" id="sheetTitle"></div>
        <div class="sheet-count" id="sheetCount"></div>
      </div>
      <button class="sheet-close" onclick="closeSheet()">Chiudi</button>
    </div>
    <div class="sheet-add-row">
      <span class="sheet-add-lbl" id="sheetAddLbl">Aggiungi tempo extra</span>
      <button class="sheet-add-btn" id="sheetAddBtn" onclick="addToSheet()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div id="sheetList"></div>
    <div class="sheet-footer" id="sheetFooter" style="display:none">
      <button class="reset-day-btn" onclick="resetDay()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Azzera giorno
      </button>
    </div>
  </div>
</div>

<!-- SUMMARY SHEET -->
<div class="sum-ov" id="sumOv" onclick="handleSumOv(event)">
  <div class="sum-sheet">
    <div class="sum-handle"></div>
    <div class="sum-head">
      <div class="sum-head-title">Riepilogo</div>
      <button class="sum-close" onclick="closeSummary()">Chiudi</button>
    </div>
    <div class="sum-body" id="sumBody"></div>
  </div>
</div>

<!-- CONFIRM ALERT -->
<div class="confirm-ov" id="confirmOv">
  <div class="confirm-box">
    <div class="confirm-text">
      <div class="confirm-title">Azzera giorno</div>
      <div class="confirm-msg" id="confirmMsg"></div>
    </div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Annulla</button>
      <button class="confirm-ok" onclick="doReset()">Azzera</button>
    </div>
  </div>
</div>

<script>
(function(){
  var MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  var DAYS=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  var RATE=5;

  function dk(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function fk(k){ var p=k.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
  function fmtDate(date){ return DAYS[date.getDay()]+' '+date.getDate()+' '+MONTHS[date.getMonth()]; }

  var today=new Date(), todayKey=dk(today);
  var viewYear=today.getFullYear(), viewMonth=today.getMonth();
  var selected=todayKey;
  var events=JSON.parse(localStorage.getItem('tempoExtra')||'{}');
  var sumPeriod='week';

  /* ─── SUPABASE ─── */
  var SB = {
    url: 'https://uzkqozfzombpwtdsjtqp.supabase.co',
    key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6a3FvemZ6b21icHd0ZHNqdHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNzcyMjQsImV4cCI6MjA5MTY1MzIyNH0.zdY2xA1mt6HQM8b-3LKV8aZ0gXADy-49mEHMaezHWEs',
    user: 'utente1'
  };

  function sbReady(){ return true; }

  function setSyncDot(state){
    var dot=document.getElementById('syncDot');
    var lbl=document.getElementById('syncBadge');
    var grp=document.getElementById('syncGroup');
    if(!dot||!lbl||!grp) return;
    grp.className='sync-group';
    dot.className='sync-pill-dot';
    lbl.className='sync-pill-lbl';
    lbl.textContent='';
    if(state==='syncing'){
      dot.classList.add('syncing');
    } else if(state==='ok'){
      dot.classList.add('ok');
      grp.classList.add('state-ok');
    } else {
      dot.classList.add('err');
      lbl.classList.add('err');
      grp.classList.add('state-err');
      lbl.textContent='Offline';
    }
  }

  window.addEventListener('online', function(){ setSyncDot('syncing'); sbLoad(); });
  window.addEventListener('offline', function(){ setSyncDot('err'); });



  async function sbFetch(path, opts){
    opts = opts || {};
    var headers = Object.assign({
      'apikey': SB.key,
      'Authorization': 'Bearer '+SB.key,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }, opts.headers || {});
    var res = await fetch(SB.url+'/rest/v1/'+path, Object.assign({}, opts, { headers: headers }));
    if(!res.ok){ var t=await res.text(); throw new Error(t); }
    return res.status===204 ? null : res.json();
  }

  /* Load all events for this user from Supabase */
  async function sbLoad(){
    if(!sbReady()) return;
    setSyncDot('syncing');
    try {
      var rows = await sbFetch('tempo_extra?user_id=eq.'+encodeURIComponent(SB.user)+'&select=day,count');
      events = {};
      rows.forEach(function(r){
        var arr=[];
        for(var i=0;i<r.count;i++) arr.push({id:r.day+'-'+i});
        events[r.day]=arr;
      });
      localStorage.setItem('tempoExtra', JSON.stringify(events));
      setSyncDot('ok');
      renderCalendar(); updateSummaryBtn();
    } catch(e){ setSyncDot('err'); console.error('sbLoad',e); }
  }

  /* Upsert a single day */
  async function sbSaveDay(day){
    if(!sbReady()) return;
    setSyncDot('syncing');
    var count=(events[day]||[]).length;
    try {
      if(count===0){
        await sbFetch('tempo_extra?user_id=eq.'+encodeURIComponent(SB.user)+'&day=eq.'+day,
          {method:'DELETE'});
      } else {
        await sbFetch('tempo_extra?on_conflict=user_id,day', {
          method:'POST',
          headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
          body: JSON.stringify({user_id:SB.user, day:day, count:count})
        });
      }
      setSyncDot('ok');
    } catch(e){ setSyncDot('err'); console.error('sbSaveDay',e); }
  }

  function save(day){
    localStorage.setItem('tempoExtra', JSON.stringify(events));
    if(day) sbSaveDay(day);
  }

  /* ─── Calendar ─── */
  function renderCalendar(){
    document.getElementById('monthYear').textContent=MONTHS[viewMonth]+' '+viewYear;
    var grid=document.getElementById('daysGrid');
    grid.innerHTML='';
    var fd=new Date(viewYear,viewMonth,1).getDay();
    var dim=new Date(viewYear,viewMonth+1,0).getDate();
    var pl=new Date(viewYear,viewMonth,0).getDate();
    for(var i=fd-1;i>=0;i--) grid.appendChild(mkCell(new Date(viewYear,viewMonth-1,pl-i),true));
    for(var d=1;d<=dim;d++) grid.appendChild(mkCell(new Date(viewYear,viewMonth,d),false));
    var tail=(fd+dim)%7; if(tail>0) for(var d2=1;d2<=7-tail;d2++) grid.appendChild(mkCell(new Date(viewYear,viewMonth+1,d2),true));
  }

  function mkCell(date,other){
    var key=dk(date);
    var el=document.createElement('div'); el.className='day-cell';
    if(other) el.classList.add('other');
    if(key===todayKey) el.classList.add('is-today');
    if(key===selected) el.classList.add('is-sel');
    if(date.getDay()===0||date.getDay()===6) el.classList.add('is-we');
    var num=document.createElement('div'); num.className='day-num'; num.textContent=date.getDate();
    el.appendChild(num);
    var evs=events[key]||[];
    if(evs.length){ var b=document.createElement('div'); b.className='day-badge'; b.textContent=evs.length; el.appendChild(b); }
    (function(k,dt){ el.addEventListener('click',function(){ pickDate(k,dt); }); })(key,date);
    return el;
  }

  function pickDate(key,date){ selected=key; renderCalendar(); openSheet(date); updateSummaryBtn(); }

  /* ─── Day Sheet ─── */
  function openSheet(date){
    var key=dk(date);
    document.getElementById('sheetTitle').textContent=fmtDate(date);
    var lbl=document.getElementById('sheetAddLbl');
    if(lbl) lbl.textContent='Aggiungi a '+DAYS[date.getDay()]+' '+date.getDate();
    renderSheetList(key);
    document.getElementById('sheetOv').classList.add('open');
  }

  function renderSheetList(key){
    var list=document.getElementById('sheetList');
    var evs=events[key]||[];
    list.innerHTML='';
    var footer=document.getElementById('sheetFooter');
    document.getElementById('sheetCount').textContent=evs.length
      ?evs.length+' temp'+(evs.length===1?'o':'i')+' extra · €'+(evs.length*RATE)
      :'Nessun tempo extra';
    if(!evs.length){
      list.innerHTML='<div class="sh-empty"><div class="sh-empty-icon">⏱️</div>Nessun tempo extra per questo giorno</div>';
      if(footer) footer.style.display='none';
      return;
    }
    if(footer) footer.style.display='';
    evs.forEach(function(ev,i){
      var item=document.createElement('div'); item.className='sh-item';
      var num=document.createElement('div'); num.className='sh-num'; num.textContent=i+1;
      var lbl=document.createElement('div'); lbl.className='sh-label'; lbl.textContent='Tempo extra';
      var eur=document.createElement('div'); eur.className='sh-euro'; eur.textContent='€'+RATE;
      var del=document.createElement('button'); del.className='sh-del';
      del.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
      (function(k,id){ del.addEventListener('click',function(){ removeEv(k,id); }); })(key,ev.id);
      item.appendChild(num);item.appendChild(lbl);item.appendChild(eur);item.appendChild(del);
      list.appendChild(item);
    });
  }

  window.closeSheet=function(){ document.getElementById('sheetOv').classList.remove('open'); };
  window.handleSheetOv=function(e){ if(e.target===document.getElementById('sheetOv')) closeSheet(); };

  /* ─── Actions ─── */
  function animateBtn(id){
    var btn=document.getElementById(id);
    if(!btn) return;
    btn.classList.remove('did-add'); void btn.offsetWidth; btn.classList.add('did-add');
    btn.addEventListener('animationend',function(){ btn.classList.remove('did-add'); },{once:true});
  }

  window.addOne=function(){
    if(!events[selected]) events[selected]=[];
    events[selected].push({id:Date.now().toString()});
    save(selected);
    animateBtn('bigPlus');
    var cnt=events[selected].length;
    var hint=document.getElementById('plusHint');
    hint.textContent='+1 aggiunto · oggi: '+cnt;
    hint.style.color='var(--green)';
    clearTimeout(window._ht);
    window._ht=setTimeout(function(){ hint.textContent='Aggiungi al giorno selezionato'; hint.style.color=''; },1800);
    renderCalendar(); updateSummaryBtn();
    if(document.getElementById('sheetOv').classList.contains('open')) renderSheetList(selected);
  };

  window.addToSheet=function(){
    if(!events[selected]) events[selected]=[];
    events[selected].push({id:Date.now().toString()});
    save(selected);
    animateBtn('sheetAddBtn');
    renderCalendar(); renderSheetList(selected); updateSummaryBtn();
  };

  function removeEv(key,id){
    events[key]=(events[key]||[]).filter(function(e){ return e.id!==id; });
    if(!events[key].length) delete events[key];
    save(key); renderCalendar(); renderSheetList(key); updateSummaryBtn();
  }

  var _resetKey=null;
  window.resetDay=function(){
    if(!(events[selected]||[]).length) return;
    _resetKey=selected;
    var d=fk(selected);
    document.getElementById('confirmMsg').textContent='Eliminare tutti i tempi extra di '+DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()]+'?';
    document.getElementById('confirmOv').classList.add('open');
  };
  window.closeConfirm=function(){ document.getElementById('confirmOv').classList.remove('open'); _resetKey=null; };
  window.doReset=function(){
    if(!_resetKey) return;
    var k=_resetKey;
    delete events[k];
    save(k); renderCalendar(); renderSheetList(k); updateSummaryBtn();
    _resetKey=null;
    document.getElementById('confirmOv').classList.remove('open');
  };

  /* ─── Summary ─── */
  function countRange(s,e){ var t=0; Object.keys(events).forEach(function(k){ var d=fk(k); if(d>=s&&d<=e) t+=(events[k]||[]).length; }); return t; }
  function countMonth(y,m){ var t=0; Object.keys(events).forEach(function(k){ var p=k.split('-'); if(+p[0]===y&&+p[1]-1===m) t+=(events[k]||[]).length; }); return t; }

  function updateSummaryBtn(){
    var sel=fk(selected);
    var ws=new Date(sel); ws.setDate(sel.getDate()-sel.getDay()); ws.setHours(0,0,0,0);
    var we=new Date(ws); we.setDate(ws.getDate()+6); we.setHours(23,59,59,999);
    var wc=countRange(ws,we), mc=countMonth(viewYear,viewMonth);
    document.getElementById('summaryBtnSub').textContent='Settimana '+wc+' (€'+(wc*RATE)+')  ·  '+MONTHS[viewMonth]+' '+mc+' (€'+(mc*RATE)+')';
  }

  window.openSummary=function(){ renderSummary(); document.getElementById('sumOv').classList.add('open'); };
  window.closeSummary=function(){ document.getElementById('sumOv').classList.remove('open'); };
  window.handleSumOv=function(e){ if(e.target===document.getElementById('sumOv')) closeSummary(); };

  function renderSummary(){
    var body=document.getElementById('sumBody'); body.innerHTML='';
    var seg=document.createElement('div'); seg.className='seg';
    var bW=document.createElement('button'); bW.className='seg-btn'+(sumPeriod==='week'?' on':''); bW.textContent='Settimane'; bW.onclick=function(){ sumPeriod='week'; renderSummary(); };
    var bM=document.createElement('button'); bM.className='seg-btn'+(sumPeriod==='month'?' on':''); bM.textContent='Mesi'; bM.onclick=function(){ sumPeriod='month'; renderSummary(); };
    seg.appendChild(bW); seg.appendChild(bM); body.appendChild(seg);
    var rows=[],grand=0;
    if(sumPeriod==='week'){
      var fom=new Date(viewYear,viewMonth,1), lom=new Date(viewYear,viewMonth+1,0);
      var cur=new Date(fom); cur.setDate(cur.getDate()-cur.getDay());
      while(cur<=lom){
        var ws=new Date(cur),we=new Date(cur); we.setDate(cur.getDate()+6); we.setHours(23,59,59,999);
        var cnt=countRange(ws,we); grand+=cnt;
        rows.push({label:ws.getDate()+' '+MONTHS[ws.getMonth()].slice(0,3)+' – '+we.getDate()+' '+MONTHS[we.getMonth()].slice(0,3),count:cnt});
        cur.setDate(cur.getDate()+7);
      }
    } else {
      for(var m=0;m<12;m++){ var c=countMonth(viewYear,m); grand+=c; rows.push({label:MONTHS[m],count:c}); }
    }
    var mc2=document.createElement('div'); mc2.className='money-card';
    mc2.innerHTML='<div class="money-top">Totale — '+(sumPeriod==='week'?MONTHS[viewMonth]+' '+viewYear:'Anno '+viewYear)+'</div><div class="money-main"><div class="money-amount">€'+(grand*RATE)+'</div><div class="money-right"><div class="money-units"><b>'+grand+'</b> tempi extra</div><div class="money-rate">€'+RATE+' cadauno</div></div></div>';
    body.appendChild(mc2);
    var grp=document.createElement('div'); grp.className='sum-group';
    var gt=document.createElement('div'); gt.className='sum-group-title'; gt.textContent=(sumPeriod==='week'?'Settimane — '+MONTHS[viewMonth]:'Mesi — '+viewYear);
    grp.appendChild(gt);
    rows.forEach(function(r){
      var row=document.createElement('div'); row.className='sum-row';
      var l=document.createElement('div'); l.className='sum-row-left'; l.textContent=r.label;
      var v=document.createElement('div'); v.className='sum-row-right '+(r.count?'has':'zero'); v.textContent=r.count?r.count+' × €'+RATE+' = €'+(r.count*RATE):'—';
      row.appendChild(l); row.appendChild(v); grp.appendChild(row);
    });
    body.appendChild(grp);
  }


  /* ─── Nav ─── */
  window.changeMonth=function(dir){ viewMonth+=dir; if(viewMonth>11){viewMonth=0;viewYear++;} if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); updateSummaryBtn(); };
  window.goToToday=function(){ viewYear=today.getFullYear(); viewMonth=today.getMonth(); selected=todayKey; renderCalendar(); updateSummaryBtn(); };

  document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ closeSheet(); closeSummary(); closeConfirm(); } });

  document.getElementById('btnRefresh').addEventListener('click', function(){
    var btn=this;
    btn.classList.add('spinning');
    btn.addEventListener('animationend', function(){ btn.classList.remove('spinning'); sbLoad(); }, {once:true});
  });

  /* ─── Init ─── */
  renderCalendar();
  updateSummaryBtn();
  if(!navigator.onLine) setSyncDot('err');
  sbLoad();
})();
</script>
</body>
</html>
